<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 88" fill="none">

  <!-- Eyelid base curve -->
  <path d="M 30 52 Q 110 30 190 52" stroke="#79CFDD" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Eyelashes fanning upward from the lid (curved outward) -->
  <!-- Far left lash -->
  <path d="M 36 50 Q 22 32 18 18" stroke="#79CFDD" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Left-center lash -->
  <path d="M 58 41 Q 50 24 48 10" stroke="#79CFDD" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Left lash -->
  <path d="M 82 34 Q 78 17 78 4" stroke="#79CFDD" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Center-left lash -->
  <path d="M 100 31 Q 98 14 100 2" stroke="#79CFDD" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Center lash -->
  <path d="M 118 31 Q 118 14 120 2" stroke="#79CFDD" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Right-center lash -->
  <path d="M 138 34 Q 142 17 144 4" stroke="#79CFDD" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Right lash -->
  <path d="M 160 40 Q 168 24 172 11" stroke="#79CFDD" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Far right lash -->
  <path d="M 180 48 Q 196 32 202 18" stroke="#79CFDD" stroke-width="1.4" stroke-linecap="round"/>

  <!-- MCI text -->
  <text x="110" y="72" font-family="'Cormorant Garamond', Georgia, serif" font-size="28" font-weight="400" fill="#FFFFFF" text-anchor="middle" letter-spacing="10">MCI</text>

  <!-- EYELASHES subtext -->
  <text x="110" y="84" font-family="'Montserrat', Arial, sans-serif" font-size="6.5" font-weight="500" fill="#79CFDD" text-anchor="middle" letter-spacing="6">EYELASHES</text>
</svg>
